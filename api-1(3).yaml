openapi: 3.0.3
info:
  title: La Carte API
  description: La Carte API documentation
  version: 0.0.1
paths:
  /api/health:
    get:
      tags:
        - Health
      summary: Health check
      description: Check API health status
      responses:
        "200":
          description: Response for status 200
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                  - timestamp
                properties:
                  status:
                    const: ok
                    type: string
                  timestamp:
                    format: date-time
                    type: string
                $id: "#/components/schemas/HealthResponse"
      operationId: getApiHealth
  /api/health/info:
    get:
      tags:
        - Health
      summary: API information
      description: Get general API information
      responses:
        "200":
          description: Response for status 200
          content:
            application/json:
              schema:
                type: object
                required:
                  - message
                  - version
                  - docs
                properties:
                  message:
                    type: string
                  version:
                    type: string
                  docs:
                    format: uri
                    type: string
                $id: "#/components/schemas/InfoResponse"
      operationId: getApiHealthInfo
  /api/auth/session:
    get:
      tags:
        - Auth
      summary: Get current session
      description: Retrieve current user session information
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Response for status 200
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data: {}
                $id: "#/components/schemas/SessionResponse"
        "401":
          description: Response for status 401
          content:
            application/json:
              schema:
                type: object
                required:
                  - success
                  - message
                properties:
                  success:
                    const: false
                    type: boolean
                  message:
                    type: string
                $id: "#/components/schemas/UnauthorizedError"
      operationId: getApiAuthSession
  /api/auth/sign-out:
    post:
      tags:
        - Auth
      summary: Sign out
      description: Clear user session
      responses:
        "200":
          description: Response for status 200
          content:
            application/json:
              schema:
                type: object
                required:
                  - message
                properties:
                  message:
                    type: string
      operationId: postApiAuthSign-out
  /api/user/profile:
    get:
      tags:
        - User
      summary: Get user profile
      description: Retrieve authenticated user profile information
      responses:
        "200":
          description: Response for status 200
          content:
            application/json:
              schema:
                type: object
                required:
                  - success
                  - data
                properties:
                  success:
                    const: true
                    type: boolean
                  data:
                    type: object
                    required:
                      - id
                      - email
                      - name
                      - image
                      - emailVerified
                      - createdAt
                      - updatedAt
                    properties:
                      id:
                        type: string
                      email:
                        format: email
                        type: string
                      name:
                        minLength: 1
                        type: string
                      image:
                        nullable: true
                        anyOf:
                          - format: uri
                            type: string
                          - type: "null"
                      emailVerified:
                        type: boolean
                      createdAt:
                        anyOf:
                          - type: Date
                          - format: date-time
                            type: string
                          - format: date
                            type: string
                          - type: number
                      updatedAt:
                        anyOf:
                          - type: Date
                          - format: date-time
                            type: string
                          - format: date
                            type: string
                          - type: number
                    $id: "#/components/schemas/Response"
        "404":
          description: Response for status 404
          content:
            application/json:
              schema:
                type: object
                required:
                  - success
                  - message
                properties:
                  success:
                    const: false
                    type: boolean
                  message:
                    const: User not found
                    type: string
                $id: "#/components/schemas/NotFoundError"
      operationId: getApiUserProfile
    patch:
      tags:
        - User
      summary: Update user profile
      description: Update authenticated user profile information
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  minLength: 1
                  maxLength: 100
                  type: string
                image:
                  format: uri
                  type: string
              $id: "#/components/schemas/UpdateRequest"
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                name:
                  minLength: 1
                  maxLength: 100
                  type: string
                image:
                  format: uri
                  type: string
              $id: "#/components/schemas/UpdateRequest"
          multipart/form-data:
            schema:
              type: object
              properties:
                name:
                  minLength: 1
                  maxLength: 100
                  type: string
                image:
                  format: uri
                  type: string
              $id: "#/components/schemas/UpdateRequest"
      responses:
        "200":
          description: Response for status 200
          content:
            application/json:
              schema:
                type: object
                required:
                  - success
                  - data
                properties:
                  success:
                    const: true
                    type: boolean
                  data:
                    type: object
                    required:
                      - id
                      - email
                      - name
                      - image
                      - emailVerified
                      - createdAt
                      - updatedAt
                    properties:
                      id:
                        type: string
                      email:
                        format: email
                        type: string
                      name:
                        minLength: 1
                        type: string
                      image:
                        nullable: true
                        anyOf:
                          - format: uri
                            type: string
                          - type: "null"
                      emailVerified:
                        type: boolean
                      createdAt:
                        anyOf:
                          - type: Date
                          - format: date-time
                            type: string
                          - format: date
                            type: string
                          - type: number
                      updatedAt:
                        anyOf:
                          - type: Date
                          - format: date-time
                            type: string
                          - format: date
                            type: string
                          - type: number
                    $id: "#/components/schemas/UpdateResponse"
        "404":
          description: Response for status 404
          content:
            application/json:
              schema:
                type: object
                required:
                  - success
                  - message
                properties:
                  success:
                    const: false
                    type: boolean
                  message:
                    const: User not found
                    type: string
                $id: "#/components/schemas/NotFoundError"
      operationId: patchApiUserProfile
  /api/customer/sign-up:
    post:
      tags:
        - Customer
      summary: Register customer
      description: Register a new customer with Better Auth integration and create
        customer profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              examples:
                - email: jane.doe@example.com
                  password: P@ssw0rd123
                  name: Jane Doe
                  phoneNumber: "+15551234567"
                  customerTypeId: 3fa85f64-5717-4562-b3fc-2c963f66afa6
                  zoneId: 7fb85f64-5717-4562-b3fc-2c963f66afa7
                  noBins: 2
              type: object
              required:
                - email
                - password
                - name
                - phoneNumber
                - customerTypeId
                - zoneId
                - noBins
              properties:
                email:
                  format: email
                  type: string
                password:
                  minLength: 8
                  maxLength: 128
                  type: string
                name:
                  minLength: 1
                  maxLength: 100
                  type: string
                phoneNumber:
                  minLength: 1
                  type: string
                customerTypeId:
                  format: uuid
                  type: string
                zoneId:
                  format: uuid
                  type: string
                noBins:
                  minimum: 1
                  anyOf:
                    - format: integer
                      default: 0
                      type: string
                    - minimum: 1
                      type: integer
              $id: "#/components/schemas/SignUpRequest"
          application/x-www-form-urlencoded:
            schema:
              examples:
                - email: jane.doe@example.com
                  password: P@ssw0rd123
                  name: Jane Doe
                  phoneNumber: "+15551234567"
                  customerTypeId: 3fa85f64-5717-4562-b3fc-2c963f66afa6
                  zoneId: 7fb85f64-5717-4562-b3fc-2c963f66afa7
                  noBins: 2
              type: object
              required:
                - email
                - password
                - name
                - phoneNumber
                - customerTypeId
                - zoneId
                - noBins
              properties:
                email:
                  format: email
                  type: string
                password:
                  minLength: 8
                  maxLength: 128
                  type: string
                name:
                  minLength: 1
                  maxLength: 100
                  type: string
                phoneNumber:
                  minLength: 1
                  type: string
                customerTypeId:
                  format: uuid
                  type: string
                zoneId:
                  format: uuid
                  type: string
                noBins:
                  minimum: 1
                  anyOf:
                    - format: integer
                      default: 0
                      type: string
                    - minimum: 1
                      type: integer
              $id: "#/components/schemas/SignUpRequest"
          multipart/form-data:
            schema:
              examples:
                - email: jane.doe@example.com
                  password: P@ssw0rd123
                  name: Jane Doe
                  phoneNumber: "+15551234567"
                  customerTypeId: 3fa85f64-5717-4562-b3fc-2c963f66afa6
                  zoneId: 7fb85f64-5717-4562-b3fc-2c963f66afa7
                  noBins: 2
              type: object
              required:
                - email
                - password
                - name
                - phoneNumber
                - customerTypeId
                - zoneId
                - noBins
              properties:
                email:
                  format: email
                  type: string
                password:
                  minLength: 8
                  maxLength: 128
                  type: string
                name:
                  minLength: 1
                  maxLength: 100
                  type: string
                phoneNumber:
                  minLength: 1
                  type: string
                customerTypeId:
                  format: uuid
                  type: string
                zoneId:
                  format: uuid
                  type: string
                noBins:
                  minimum: 1
                  anyOf:
                    - format: integer
                      default: 0
                      type: string
                    - minimum: 1
                      type: integer
              $id: "#/components/schemas/SignUpRequest"
      responses:
        "201":
          description: Response for status 201
          content:
            application/json:
              schema:
                type: object
                required:
                  - id
                  - userId
                  - customerTypeId
                  - zoneId
                  - phoneNumber
                  - noBins
                  - status
                  - user
                  - customerType
                properties:
                  id:
                    format: uuid
                    type: string
                  userId:
                    format: uuid
                    type: string
                  customerTypeId:
                    format: uuid
                    type: string
                  zoneId:
                    format: uuid
                    type: string
                  phoneNumber:
                    type: string
                  noBins:
                    anyOf:
                      - format: integer
                        default: 0
                        type: string
                      - type: integer
                  status:
                    type: string
                  user:
                    type: object
                    required:
                      - id
                      - email
                      - name
                      - emailVerified
                    properties:
                      id:
                        format: uuid
                        type: string
                      email:
                        type: string
                      name:
                        type: string
                      emailVerified:
                        type: boolean
                  customerType:
                    type: object
                    required:
                      - id
                      - name
                    properties:
                      id:
                        format: uuid
                        type: string
                      name:
                        type: string
                $id: "#/components/schemas/SignUpResponse"
        "400":
          description: Response for status 400
          content:
            application/json:
              schema:
                type: object
                required:
                  - message
                properties:
                  message:
                    type: string
                $id: "#/components/schemas/ErrorResponse"
                additionalProperties: false
        "500":
          description: Response for status 500
          content:
            application/json:
              schema:
                type: object
                required:
                  - message
                properties:
                  message:
                    type: string
                $id: "#/components/schemas/ErrorResponse"
                additionalProperties: false
      operationId: postApiCustomerSign-up
  /api/customer/types:
    get:
      tags:
        - Customer
      summary: List customer types
      description: Get all available customer types for registration form
      responses:
        "200":
          description: Response for status 200
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                    - id
                    - name
                    - createdAt
                    - updatedAt
                  properties:
                    id:
                      format: uuid
                      type: string
                    name:
                      type: string
                    createdAt:
                      anyOf:
                        - type: Date
                        - format: date-time
                          type: string
                        - format: date
                          type: string
                        - type: number
                    updatedAt:
                      anyOf:
                        - type: Date
                        - format: date-time
                          type: string
                        - format: date
                          type: string
                        - type: number
                  $id: "#/components/schemas/CustomerTypeItem"
      operationId: getApiCustomerTypes
  /api/customer/admin/list:
    get:
      tags:
        - Customer
        - admin
      summary: List all customers (Admin only)
      description: Get paginated list of all customers with filters and search.
        Requires admin role.
      parameters:
        - name: page
          in: query
          required: false
          schema:
            minimum: 1
            default: 1
            anyOf:
              - format: integer
                default: 0
                type: string
              - minimum: 1
                default: 1
                type: integer
        - name: limit
          in: query
          required: false
          schema:
            minimum: 1
            maximum: 100
            default: 50
            anyOf:
              - format: integer
                default: 0
                type: string
              - minimum: 1
                maximum: 100
                default: 50
                type: integer
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum:
              - active
              - inactive
              - suspended
        - name: search
          in: query
          required: false
          schema:
            minLength: 1
            type: string
        - name: customerTypeId
          in: query
          required: false
          schema:
            format: uuid
            type: string
        - name: zoneId
          in: query
          required: false
          schema:
            format: uuid
            type: string
        - name: region
          in: query
          required: false
          schema:
            type: string
        - name: city
          in: query
          required: false
          schema:
            type: string
        - name: country
          in: query
          required: false
          schema:
            type: string
        - name: createdAfter
          in: query
          required: false
          schema:
            format: date-time
            type: string
        - name: createdBefore
          in: query
          required: false
          schema:
            format: date-time
            type: string
      responses:
        "200":
          description: Response for status 200
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                  - pagination
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      required:
                        - id
                        - userId
                        - customerTypeId
                        - zoneId
                        - phoneNumber
                        - noBins
                        - status
                        - address
                        - city
                        - region
                        - postalCode
                        - country
                        - placeName
                        - locationUpdatedAt
                        - createdAt
                        - updatedAt
                        - user
                        - customerType
                        - zone
                      properties:
                        id:
                          format: uuid
                          type: string
                        userId:
                          format: uuid
                          type: string
                        customerTypeId:
                          format: uuid
                          type: string
                        zoneId:
                          nullable: true
                          anyOf:
                            - format: uuid
                              type: string
                            - type: "null"
                        phoneNumber:
                          type: string
                        noBins:
                          anyOf:
                            - format: integer
                              default: 0
                              type: string
                            - type: integer
                        status:
                          type: string
                        address:
                          nullable: true
                          anyOf:
                            - type: string
                            - type: "null"
                        city:
                          nullable: true
                          anyOf:
                            - type: string
                            - type: "null"
                        region:
                          nullable: true
                          anyOf:
                            - type: string
                            - type: "null"
                        postalCode:
                          nullable: true
                          anyOf:
                            - type: string
                            - type: "null"
                        country:
                          nullable: true
                          anyOf:
                            - type: string
                            - type: "null"
                        placeName:
                          nullable: true
                          anyOf:
                            - type: string
                            - type: "null"
                        locationUpdatedAt:
                          nullable: true
                          anyOf:
                            - anyOf:
                                - type: Date
                                - format: date-time
                                  type: string
                                - format: date
                                  type: string
                                - type: number
                            - type: "null"
                        createdAt:
                          anyOf:
                            - type: Date
                            - format: date-time
                              type: string
                            - format: date
                              type: string
                            - type: number
                        updatedAt:
                          anyOf:
                            - type: Date
                            - format: date-time
                              type: string
                            - format: date
                              type: string
                            - type: number
                        user:
                          type: object
                          required:
                            - id
                            - email
                            - name
                            - emailVerified
                            - role
                            - banned
                            - createdAt
                            - updatedAt
                          properties:
                            id:
                              format: uuid
                              type: string
                            email:
                              format: email
                              type: string
                            name:
                              type: string
                            emailVerified:
                              type: boolean
                            role:
                              nullable: true
                              anyOf:
                                - type: string
                                - type: "null"
                            banned:
                              nullable: true
                              anyOf:
                                - type: boolean
                                - type: "null"
                            createdAt:
                              anyOf:
                                - type: Date
                                - format: date-time
                                  type: string
                                - format: date
                                  type: string
                                - type: number
                            updatedAt:
                              anyOf:
                                - type: Date
                                - format: date-time
                                  type: string
                                - format: date
                                  type: string
                                - type: number
                        customerType:
                          type: object
                          required:
                            - id
                            - name
                            - createdAt
                            - updatedAt
                          properties:
                            id:
                              format: uuid
                              type: string
                            name:
                              type: string
                            createdAt:
                              anyOf:
                                - type: Date
                                - format: date-time
                                  type: string
                                - format: date
                                  type: string
                                - type: number
                            updatedAt:
                              anyOf:
                                - type: Date
                                - format: date-time
                                  type: string
                                - format: date
                                  type: string
                                - type: number
                        zone:
                          nullable: true
                          anyOf:
                            - type: object
                              required:
                                - id
                                - name
                                - color
                                - isActive
                              properties:
                                id:
                                  format: uuid
                                  type: string
                                name:
                                  type: string
                                color:
                                  type: string
                                isActive:
                                  type: boolean
                            - type: "null"
                      $id: "#/components/schemas/AdminCustomerResponse"
                  pagination:
                    type: object
                    required:
                      - page
                      - limit
                      - total
                      - totalPages
                      - hasNextPage
                      - hasPreviousPage
                    properties:
                      page:
                        minimum: 1
                        anyOf:
                          - format: integer
                            default: 0
                            type: string
                          - minimum: 1
                            type: integer
                      limit:
                        minimum: 1
                        anyOf:
                          - format: integer
                            default: 0
                            type: string
                          - minimum: 1
                            type: integer
                      total:
                        minimum: 0
                        anyOf:
                          - format: integer
                            default: 0
                            type: string
                          - minimum: 0
                            type: integer
                      totalPages:
                        minimum: 0
                        anyOf:
                          - format: integer
                            default: 0
                            type: string
                          - minimum: 0
                            type: integer
                      hasNextPage:
                        type: boolean
                      hasPreviousPage:
                        type: boolean
                $id: "#/components/schemas/AdminCustomersListResponse"
                additionalProperties: false
        "401":
          description: Response for status 401
          content:
            application/json:
              schema:
                type: object
                required:
                  - message
                properties:
                  message:
                    type: string
                $id: "#/components/schemas/ErrorResponse"
                additionalProperties: false
        "403":
          description: Response for status 403
          content:
            application/json:
              schema:
                type: object
                required:
                  - message
                properties:
                  message:
                    type: string
                $id: "#/components/schemas/ErrorResponse"
                additionalProperties: false
        "500":
          description: Response for status 500
          content:
            application/json:
              schema:
                type: object
                required:
                  - message
                properties:
                  message:
                    type: string
                $id: "#/components/schemas/ErrorResponse"
                additionalProperties: false
      operationId: getApiCustomerAdminList
  /api/location/:
    get:
      tags:
        - Location
      summary: Get customer location
      description: Retrieve the authenticated customer's waste pickup location.
        Location data is strictly private and only accessible to the customer,
        assigned drivers, and administrators.
      responses:
        "200":
          description: Response for status 200
          content:
            application/json:
              schema:
                type: object
                required:
                  - address
                  - city
                  - region
                  - postalCode
                  - country
                  - latitude
                  - longitude
                  - placeName
                  - placeId
                  - locationUpdatedAt
                properties:
                  address:
                    nullable: true
                    anyOf:
                      - type: string
                      - type: "null"
                  city:
                    nullable: true
                    anyOf:
                      - type: string
                      - type: "null"
                  region:
                    nullable: true
                    anyOf:
                      - type: string
                      - type: "null"
                  postalCode:
                    nullable: true
                    anyOf:
                      - type: string
                      - type: "null"
                  country:
                    type: string
                  latitude:
                    nullable: true
                    anyOf:
                      - type: number
                      - type: "null"
                  longitude:
                    nullable: true
                    anyOf:
                      - type: number
                      - type: "null"
                  placeName:
                    nullable: true
                    anyOf:
                      - type: string
                      - type: "null"
                  placeId:
                    nullable: true
                    anyOf:
                      - type: string
                      - type: "null"
                  locationUpdatedAt:
                    nullable: true
                    anyOf:
                      - anyOf:
                          - type: Date
                          - format: date-time
                            type: string
                          - format: date
                            type: string
                          - type: number
                      - type: "null"
                $id: "#/components/schemas/LocationResponse"
        "401":
          description: Response for status 401
          content:
            application/json:
              schema:
                type: object
                required:
                  - message
                properties:
                  message:
                    type: string
        "404":
          description: Response for status 404
          content:
            application/json:
              schema:
                type: object
                required:
                  - message
                properties:
                  message:
                    type: string
                $id: "#/components/schemas/ErrorResponse"
                additionalProperties: false
      operationId: getApiLocation
    post:
      tags:
        - Location
      summary: Save customer location
      description: Add or update the authenticated customer's waste pickup location.
        Accepts address data with coordinates from the map provider (Mapbox).
        Both address and city are required fields. Coordinates must be within
        Ghana boundaries.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              examples:
                - address: 123 Independence Avenue
                  city: Accra
                  region: Greater Accra Region
                  latitude: 5.6037
                  longitude: -0.187
                  placeName: Accra, Ghana
                - address: Osu Oxford Street
                  city: Accra
                  region: Greater Accra Region
                  latitude: 5.5558
                  longitude: -0.1821
                  placeName: Osu, Accra, Ghana
              type: object
              required:
                - address
                - city
                - latitude
                - longitude
              properties:
                address:
                  minLength: 1
                  maxLength: 500
                  type: string
                city:
                  minLength: 1
                  maxLength: 100
                  type: string
                region:
                  maxLength: 100
                  type: string
                postalCode:
                  maxLength: 20
                  type: string
                country:
                  minLength: 1
                  maxLength: 100
                  type: string
                placeName:
                  minLength: 1
                  maxLength: 500
                  type: string
                placeId:
                  maxLength: 255
                  type: string
                latitude:
                  minimum: -90
                  maximum: 90
                  type: number
                longitude:
                  minimum: -180
                  maximum: 180
                  type: number
              $id: "#/components/schemas/SaveLocationRequest"
          application/x-www-form-urlencoded:
            schema:
              examples:
                - address: 123 Independence Avenue
                  city: Accra
